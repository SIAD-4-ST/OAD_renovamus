<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Invariants — coeur.js</title>
  <style>
    body  { font-family: monospace; max-width: 960px; margin: 2em auto; padding: 0 1em; }
    h1    { font-size: 1.3em; }
    h2    { font-size: 1em; margin: 1.4em 0 .3em; color: #555; border-bottom: 1px solid #ddd; }
    .PASS { color: #1a7a1a; }
    .FAIL { color: #c00; font-weight: bold; }
    #summary { margin-top: 2em; font-size: 1.2em; border-top: 2px solid #333;
               padding-top: .6em; font-weight: bold; }
  </style>
</head>
<body>
<h1>Invariants — coeur.js &amp; econ.js</h1>
<div id="output"></div>
<div id="summary"></div>

<script src="../js/coeur.js"></script>
<script src="../js/econ.js"></script>
<script>
(function () {
  'use strict';

  /* ── mini-harnais ──────────────────────────────────────────── */
  var _total = 0, _fails = 0;

  function assert(cond, label) {
    _total++;
    if (!cond) _fails++;
    var tag  = cond ? 'PASS' : 'FAIL';
    var text = '[' + tag + '] ' + label;
    (cond ? console.log : console.error)(text);
    var div = document.createElement('div');
    div.className = tag;
    div.textContent = text;
    document.getElementById('output').appendChild(div);
  }

  function section(title) {
    var h = document.createElement('h2');
    h.textContent = title;
    document.getElementById('output').appendChild(h);
  }

  /* ── projeterReserve ───────────────────────────────────────── */
  section('projeterReserve');

  var BASE_PR = {
    surfTot: 10, surfArr: 2,  riInit: 2000, volco: 9000, rend: 12000,
    plafondRI: 8000, sortieAnnuelleParHa: 3000, dureeRepos: 3, finSortie: 6,
    anticipe: false, horizon: 10
  };

  var JEUX_PR = [
    BASE_PR,
    Object.assign({}, BASE_PR, { surfTot:  5, surfArr: 1, riInit: 1000 }),
    Object.assign({}, BASE_PR, { surfTot: 20, surfArr: 5, riInit:    0 }),
    Object.assign({}, BASE_PR, { riInit: 8000 }),            // stock initial au plafond
    Object.assign({}, BASE_PR, { rend: 5000 }),              // rendement faible → déstocker
    Object.assign({}, BASE_PR, { anticipe: true }),
    Object.assign({}, BASE_PR, { anticipe: true, surfTot: 15, surfArr: 4, riInit: 3000 }),
  ];

  JEUX_PR.forEach(function (p, ji) {
    var lbl  = 'PR jeu' + ji;
    var rows = projeterReserve(p).rows;

    /* sha >= 0 sur toutes les lignes */
    assert(
      rows.every(function (r) { return r.sha >= 0; }),
      lbl + ' : sha >= 0 sur toutes les lignes'
    );

    /* fin <= plafondRI * surfTot (epsilon 1 pour arrondi Math.round) */
    var plafTot = p.plafondRI * p.surfTot;
    assert(
      rows.every(function (r) { return r.fin <= plafTot + 1; }),
      lbl + ' : fin <= plafondRI*surfTot (eps=1)'
    );

    /* conservation annuelle : fin ≈ déb + mise - sins - sarr
       Les valeurs en lignes sont toutes Math.round => erreur cumulée max 2.5,
       on tolère eps=3. */
    assert(
      rows.every(function (r, i) {
        var deb = i === 0
          ? Math.round(p.riInit * p.surfTot)
          : rows[i - 1].fin;
        return Math.abs(r.fin - (deb + r.mise - r.sins - r.sarr)) <= 3;
      }),
      lbl + ' : conservation fin ≈ déb+mise-sins-sarr (eps=3)'
    );

    /* mode anticipe=true : sarr === 0 sur toutes les lignes */
    if (p.anticipe) {
      assert(
        rows.every(function (r) { return r.sarr === 0; }),
        lbl + ' : anticipe=true → sarr === 0'
      );
    }
  });

  /* ── dimensionnerPlantation ────────────────────────────────── */
  section('dimensionnerPlantation');

  var BASE_DP = {
    surf: 1, rang: 1.2, pied: 1.0, paires: 1,
    prixPlant: 2.5, basePal: 2.0, palFactor: 1.0,
    cPriceCouvert: 500, dureeCouvert: 3, prixPrepHa: 3000,
    margePlants: 1.05
  };

  var JEUX_DP = [
    BASE_DP,
    Object.assign({}, BASE_DP, { surf: 2.5, rang: 1.5, pied: 0.9 }),
    Object.assign({}, BASE_DP, { surf: 0.5, rang: 1.0, pied: 0.8, paires: 2 }),
    Object.assign({}, BASE_DP, { surf: 3,   rang: 1.8, pied: 1.1, paires: 2 }),
    Object.assign({}, BASE_DP, { margePlants: 1.10 }),
  ];

  JEUX_DP.forEach(function (p, ji) {
    var lbl = 'DP jeu' + ji;
    var res = dimensionnerPlantation(p);
    var m   = res.metrics;
    var b   = res.budget;

    /* densite > 0 */
    assert(m.densite > 0, lbl + ' : densite > 0');

    /* plantsACommander >= pieds */
    assert(m.plantsACommander >= m.pieds, lbl + ' : plantsACommander >= pieds');

    /* budget.total = somme des quatre postes (arithmétique exacte, eps 0.01) */
    var somme = b.vegetal + b.palissage + b.couvert + b.preparation;
    assert(
      Math.abs(b.total - somme) < 0.01,
      lbl + ' : budget.total = vegetal+palissage+couvert+preparation'
    );

    /* tous les postes de budget >= 0 */
    assert(
      [b.vegetal, b.palissage, b.couvert, b.preparation, b.total]
        .every(function (v) { return v >= 0; }),
      lbl + ' : tous les postes de budget >= 0'
    );
  });

  /* monotonie : à surface égale, rang*pied plus petit → densité plus grande */
  (function () {
    var WIDE   = Object.assign({}, BASE_DP, { surf: 1, rang: 1.5, pied: 1.0 }); // 1.50 m²
    var MEDIUM = Object.assign({}, BASE_DP, { surf: 1, rang: 1.2, pied: 1.0 }); // 1.20 m²
    var TIGHT  = Object.assign({}, BASE_DP, { surf: 1, rang: 1.0, pied: 0.9 }); // 0.90 m²
    var dW = dimensionnerPlantation(WIDE).metrics.densite;
    var dM = dimensionnerPlantation(MEDIUM).metrics.densite;
    var dT = dimensionnerPlantation(TIGHT).metrics.densite;
    assert(dT > dM && dM > dW,
      'DP monotonie : écartement 1.50→1.20→0.90 m² → densité strictement croissante');
  }());

  /* ── calcIndice ────────────────────────────────────────────── */
  section('calcIndice');

  var BASE_CI = {
    valeurs: { surface: 0.5, productivite: 6000, manquants: 30,
               enroulement: 1, courtNoue: 0.5 },
    pond: { pp: 1, pm: 2, pv: 1, ppr: 1, pd: 1 },
    riExploitation: 5000, surfExploitation: 2,
    communeEnFD: false, fdDist: null
  };

  var JEUX_CI = [
    BASE_CI,
    Object.assign({}, BASE_CI, { communeEnFD: true, fdDist: 300  }),
    Object.assign({}, BASE_CI, { communeEnFD: true, fdDist: 0    }),
    Object.assign({}, BASE_CI, { communeEnFD: true, fdDist: 1500 }),  // hors foyer
    Object.assign({}, BASE_CI, {
      valeurs: Object.assign({}, BASE_CI.valeurs,
        { manquants: 0, enroulement: 0, courtNoue: 0 })
    }),
    Object.assign({}, BASE_CI, {
      valeurs: Object.assign({}, BASE_CI.valeurs,
        { manquants: 100, enroulement: 3, courtNoue: 3 })
    }),
    Object.assign({}, BASE_CI, { riExploitation: 0, surfExploitation: 1 }),
  ];

  JEUX_CI.forEach(function (p, ji) {
    var lbl = 'CI jeu' + ji;
    var res = calcIndice(p);

    /* I dans [0, 100] */
    assert(res.I >= 0 && res.I <= 100, lbl + ' : I dans [0,100]');

    /* chaque composante sc dans [0, 100] */
    var scVals = Object.keys(res.sc).map(function (k) { return res.sc[k]; });
    assert(
      scVals.every(function (v) { return v >= 0 && v <= 100; }),
      lbl + ' : chaque sc dans [0,100]'
    );
  });

  /* pondérations toutes à zéro → I === 0 */
  (function () {
    var p = Object.assign({}, BASE_CI,
      { pond: { pp: 0, pm: 0, pv: 0, ppr: 0, pd: 0 } });
    assert(calcIndice(p).I === 0, 'CI pond=0 → I === 0');
  }());

  /* monotonie : augmenter manquants (pm > 0) ne fait jamais baisser I */
  (function () {
    var seuils = [0, 5, 20, 50, 80, 100, 150];
    var prev   = -Infinity;
    var mono   = true;
    for (var i = 0; i < seuils.length; i++) {
      var p = Object.assign({}, BASE_CI, {
        valeurs: Object.assign({}, BASE_CI.valeurs, { manquants: seuils[i] })
      });
      var I = calcIndice(p).I;
      if (I < prev - 0.05) { mono = false; break; }  // 0.05 pour l'arrondi toFixed(1)
      prev = I;
    }
    assert(mono, 'CI monotonie : manquants croissants (pm>0) → I non décroissant');
  }());

  /* ── calculerBilanRenouvellement ──────────────────────────── */
  section('calculerBilanRenouvellement');

  var BASE_BILAN_SIM = {
    surfTot: 10, surfArr: 2, riInit: 2000, volco: 9000, rend: 12000,
    plafondRI: 8000, sortieAnnuelleParHa: 3000, dureeRepos: 3, finSortie: 6,
    anticipe: false, horizon: 10
  };
  var BASE_BILAN_PLANT = {
    surf: 2, rang: 1.2, pied: 1.0, paires: 1,
    prixPlant: 2.5, basePal: 2.0, palFactor: 1.0,
    cPriceCouvert: 500, dureeCouvert: 3, prixPrepHa: 3000,
    margePlants: 1.05
  };
  var ECO_T = {
    prixKgRaisin: 7.0, coutArrachageHa: 3500,
    aidePlantationHa: 5600, aidePalissageHa: 2500,
    coefReductionAide: 1.0, indemnitePerteRecetteHa: 2000
  };

  var JEUX_BILAN = [
    { simulation: BASE_BILAN_SIM, plantation: BASE_BILAN_PLANT, eco: ECO_T },
    { simulation: Object.assign({}, BASE_BILAN_SIM, { anticipe: true }), plantation: BASE_BILAN_PLANT, eco: ECO_T },
    { simulation: Object.assign({}, BASE_BILAN_SIM, { surfArr: 1, surfTot: 5 }), plantation: Object.assign({}, BASE_BILAN_PLANT, { surf: 1 }), eco: ECO_T },
    { simulation: Object.assign({}, BASE_BILAN_SIM, { riInit: 0 }), plantation: BASE_BILAN_PLANT, eco: ECO_T },
    { simulation: Object.assign({}, BASE_BILAN_SIM, { anticipe: true, surfArr: 3, surfTot: 8 }), plantation: Object.assign({}, BASE_BILAN_PLANT, { surf: 3 }), eco: ECO_T },
  ];

  JEUX_BILAN.forEach(function(p, ji) {
    var lbl = 'BILAN jeu' + ji;
    var res = calculerBilanRenouvellement(p);
    var ind = res.indicateurs;

    assert(ind.couvertureRI >= 0,        lbl + ' : couvertureRI >= 0');
    assert(ind.couvertureAides >= 0,     lbl + ' : couvertureAides >= 0');
    assert(ind.besoinTresorerieMax >= 0, lbl + ' : besoinTresorerieMax >= 0');

    var sumNet     = res.flux.reduce(function(s, r) { return s + r.net; }, 0);
    var cumulFinal = res.flux[res.flux.length - 1].cumul;
    assert(Math.abs(sumNet - cumulFinal) < 0.01, lbl + ' : Σ net === cumul[horizon]');
  });

  /* anticipe=true : Σ sortieRI_euros === 0 ET indemnité totale === 0 */
  (function () {
    var sim   = Object.assign({}, BASE_BILAN_SIM, { anticipe: true });
    var res   = calculerBilanRenouvellement({ simulation: sim, plantation: BASE_BILAN_PLANT, eco: ECO_T });

    var sumRI = res.flux.reduce(function(s, r) { return s + r.sortieRI_euros; }, 0);
    assert(sumRI === 0, 'BILAN anticipe=true → Σ sortieRI_euros === 0');

    /* Σ aides doit être égal à l'aide plantation seule (sans indemnité) */
    var aidePlanOnly = (ECO_T.aidePlantationHa + ECO_T.aidePalissageHa) * sim.surfArr * ECO_T.coefReductionAide;
    var sumAides     = res.flux.reduce(function(s, r) { return s + r.aides; }, 0);
    assert(Math.abs(sumAides - aidePlanOnly) < 0.01, 'BILAN anticipe=true → indemnité totale === 0');
  }());

  /* anticipe=false : indemnité totale > 0 (avec indemnitePerteRecetteHa > 0) */
  (function () {
    var res = calculerBilanRenouvellement({ simulation: BASE_BILAN_SIM, plantation: BASE_BILAN_PLANT, eco: ECO_T });

    /* Σ aides > aide plantation seule ⟺ indemnité > 0 */
    var aidePlanOnly = (ECO_T.aidePlantationHa + ECO_T.aidePalissageHa) * BASE_BILAN_SIM.surfArr * ECO_T.coefReductionAide;
    var sumAides     = res.flux.reduce(function(s, r) { return s + r.aides; }, 0);
    assert(sumAides > aidePlanOnly, 'BILAN anticipe=false → indemnité totale > 0');
  }());

  /* ── récapitulatif ─────────────────────────────────────────── */
  var summary = _total + ' test' + (_total !== 1 ? 's' : '') +
                ', ' + _fails + ' échec' + (_fails !== 1 ? 's' : '');
  console.log('─── ' + summary + ' ───');
  var el = document.getElementById('summary');
  el.textContent = summary;
  el.style.color  = _fails === 0 ? '#1a7a1a' : '#c00';
}());
</script>
</body>
</html>
